name: build-dzen-feed

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'      # каждый день 04:00 UTC (07:00 МСК)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Собрать Дзен-фид
        run: |
          mkdir -p public
          python gen_dzen_feed.py public/feed.xml
          cp index.html public/index.html
          echo "Готово:"; ls -la public
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
